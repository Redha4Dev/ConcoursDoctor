  /api/v1/candidates/{sessionId}/{id}:
    get:
      summary: Get candidate by ID
      description: Returns a single candidate's full details. Any authenticated user.
      tags: [Candidates]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
