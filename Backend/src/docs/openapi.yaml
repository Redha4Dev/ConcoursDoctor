          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Formation detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FormationDetail"
        "401":
          description: Not authenticated
        "404":
          description: Formation not found

    # MODIFIED 2026-05-01: Updated description; coordinatorId now accepted
    patch:
      summary: Update formation
      description: |
        Update formation name, department, description, isActive flag, or coordinator.
        Formation code cannot be changed (it is an immutable identifier).
        Admin only.
      tags: [Formations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFormationBody"
            example:
              name: Doctorat en Informatique Avancée
              isActive: false
      responses:
        "200":
          description: Formation updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FormationDetail"
        "400":
          description: Coordinator not found or inactive
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin only
        "404":
          description: Formation not found

    # ADDED 2026-05-01: DELETE /formations/{id} — smart delete (hard if no sessions, soft otherwise)
    delete:
      summary: Delete or deactivate formation
      description: |
        Smart delete:
        - If no sessions exist: permanently deletes the formation and its specializations.
        - If sessions exist: soft-deactivates (isActive=false). Formation cannot be re-activated via this endpoint.
        Returns `{ permanent: true }` or `{ permanent: false }` to indicate the outcome.
        Admin only.
      tags: [Formations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Formation deleted or deactivated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          permanent:
                            type: boolean
                            description: true = hard deleted, false = soft deactivated
        "400":
          description: Formation is already inactive
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin only
        "404":
          description: Formation not found

