          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Candidate detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Candidate"
        "404":
          description: Candidate not found

    delete:
      summary: Remove candidate
      description: |
        Remove a candidate from a session.
        Only allowed while session status is DRAFT or OPEN.
        Admin or Coordinator only.
      tags: [Candidates]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Candidate removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Cannot delete after session is locked
        "404":
          description: Candidate not found

