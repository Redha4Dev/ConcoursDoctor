openapi: 3.1.0

info:
  title: ConcoursDoctor API
  description: |
    Backend API for ConcoursDoctor — Doctoral Competition Management System.
    Developed at ESI-SBA, Sidi Bel Abbès — Academic Year 2025/2026.

    ## Authentication
    All protected routes require a valid JWT token stored in an httpOnly cookie (`jwt`).
    The JWT is also returned in the login response body for clients that cannot read cookies.
    Login via `POST /api/v1/auth/login` to obtain the cookie.

    ## Roles
    - **ADMIN** — Full access. Creates all user accounts.
    - **COORDINATOR** — Manages sessions, assigns correctors, configures grading.
    - **STAFF** — Default professor account, assignable to session-specific duties.

    ## Session Functions
    - **CORRECTOR** — Grades assigned anonymous copies in a specific session.
    - **JURY_MEMBER** — Reviews deliberation results for a specific session.
    - **SURVEILLANT** — Records attendance during a specific session.
    - **AUDITOR** — Read-only session audit function.

    ## Change Log
    - **2026-05-01** — Full sync pass against implementation.
      - Users: Refactored to flat model (removed profile sub-tables). CreateUserBody no longer accepts `role`.
      - Auth: Login response now includes `token` in body. Password policies tightened (uppercase + number required).
      - Formations: Added `coordinatorId` to CreateFormationBody. Added DELETE and full Specializations CRUD. Removed staff routes (moved to Sessions).
      - Sessions: Removed `availableSlots` from CreateSessionBody (moved to SessionSpecialization). Added DELETE, Specializations CRUD, updated Staff assignment (function field). Fixed openSession 403 status.
      - Rooms: `AddRoomToSessionBody` now requires `specializationId`. `UpdateSessionRoomBody.usedCapacity` is now optional.
  version: 1.0.0
  contact:
    name: ESI-SBA — ConcoursDoctor Team

servers:
  - url: http://localhost:4213
    description: Local development

tags:
  - name: System
    description: Health check and system status
  - name: Auth
    description: Authentication — login, logout, password management
  - name: Users
    description: User management (Admin only) — create, list, update, deactivate
  - name: Formations
    description: Doctoral formation management
  - name: Sessions
    description: Competition session management
  - name: Candidates
    description: Candidate import, listing, and management
  - name: Rooms
    description: Room management and session room assignments
  - name: Attendance
    description: Attendance scanning, room candidate views, summaries, and locking

# ─── REUSABLE COMPONENTS ──────────────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: jwt

  schemas:
    # ── Generic ──────────────────────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: Error message
        details:
          nullable: true

    Pagination:
      type: object
      properties:
        total:
          type: integer
          example: 47
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 3
        hasNext:
          type: boolean
          example: true
        hasPrev:
          type: boolean
          example: false

    # ── Enums ─────────────────────────────────────────────────────────────────
    Role:
      type: string
      enum: [ADMIN, COORDINATOR, STAFF]

    SessionFunction:
      type: string
      enum: [CORRECTOR, JURY_MEMBER, SURVEILLANT, AUDITOR]

    SessionStatus:
      type: string
      enum:
        [
          DRAFT,
          OPEN,
          ATTENDANCE_LOCKED,
          ANONYMIZED,
          CORRECTION_OPEN,
          DELIBERATION,
          CLOSED,
          ARCHIVED,
        ]

    CandidateStatus:
      type: string
      enum: [REGISTERED, VALID, INVALID]

    ImportSource:
      type: string
      enum: [CSV, EXCEL, API, MANUAL]

    # ── User ──────────────────────────────────────────────────────────────────
    # MODIFIED 2026-05-01: User model refactored from role-specific sub-tables
    # to a flat model. Profile fields (phoneNumber, institution, etc.) are now
    # direct columns on the User record. sessionStaff replaces formationStaff.
    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
          example: Ahmed
        lastName:
          type: string
          example: Benali
        email:
          type: string
          format: email
          example: ahmed.benali@usthb.dz
        role:
          $ref: "#/components/schemas/Role"
        isActive:
          type: boolean
        lastLogin:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        institution:
          type: string
          nullable: true
          example: USTHB
        academicGrade:
          type: string
          nullable: true
          example: Professeur
        specialization:
          type: string
          nullable: true
          example: Intelligence Artificielle
        sessionStaff:
          type: array
          description: Sessions this user is assigned to as staff
          items:
            type: object
            properties:
              function:
                $ref: "#/components/schemas/SessionFunction"
              session:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  label:
                    type: string
                  academicYear:
                    type: string
                  formation:
                    type: object
                    properties:
                      name:
                        type: string
                      code:
                        type: string

    # MODIFIED 2026-05-01: Flat model; removed all profile sub-schemas.
    # Added mustChangePassword, updatedAt, phoneNumber, sessionStaff with session status.
    UserDetail:
      allOf:
        - $ref: "#/components/schemas/UserSummary"
        - type: object
          properties:
            mustChangePassword:
              type: boolean
            updatedAt:
              type: string
              format: date-time
            phoneNumber:
              type: string
              nullable: true
              example: "0555123456"
            sessionStaff:
              type: array
              description: Full session staff records including session status
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  function:
                    $ref: "#/components/schemas/SessionFunction"
                  assignedAt:
                    type: string
                    format: date-time
                  session:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      label:
                        type: string
                      academicYear:
                        type: string
                      status:
                        $ref: "#/components/schemas/SessionStatus"
                      formation:
                        type: object
                        properties:
                          name:
                            type: string
                          code:
                            type: string

    # REMOVED 2026-05-01: CoordinatorProfile, SurveillantProfile, CorrectorProfile,
    # JuryMemberProfile, AuditorProfile — these role-specific sub-tables were removed
    # from the Prisma schema. Profile data is now stored as flat columns on User.

    # MODIFIED 2026-05-01: CreateUserBody — role is NO LONGER accepted at creation time.
    # Users are created with role=STAFF. Session duties are assigned separately
    # via POST /sessions/{id}/staff. Removed: role, department, academicRank, scope.
    # Added: phoneNumber, institution, academicGrade, specialization (optional, role-agnostic).
    CreateUserBody:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName:
          type: string
          minLength: 2
          example: Ahmed
        lastName:
          type: string
          minLength: 2
          example: Benali
        email:
          type: string
          format: email
          example: ahmed.benali@usthb.dz
        phoneNumber:
          type: string
          example: "0555123456"
        institution:
          type: string
          example: USTHB
        academicGrade:
          type: string
          example: Professeur
        specialization:
          type: string
          example: Intelligence Artificielle

    # MODIFIED 2026-05-01: UpdateUserBody — removed department, academicRank, scope, isAvailable
    # (no longer exist on the User model). Kept flat fields that match UpdateUserSchema.
    UpdateUserBody:
      type: object
      properties:
        firstName:
          type: string
          minLength: 2
        lastName:
          type: string
          minLength: 2
        phoneNumber:
          type: string
        institution:
          type: string
        academicGrade:
          type: string
        specialization:
          type: string

    # ── Formation ─────────────────────────────────────────────────────────────
    # MODIFIED 2026-05-01: FormationSummary now includes coordinator object and
    # active specializations (sub-table added to schema). Removed staff count.
    FormationSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Doctorat en Informatique
        code:
          type: string
          example: INFO-2026
        department:
          type: string
          example: Informatique
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
        coordinatorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        coordinator:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            firstName:
              type: string
            lastName:
              type: string
        specializations:
          type: array
          description: Active specializations for this formation
          items:
            $ref: "#/components/schemas/Specialization"
        _count:
          type: object
          properties:
            sessions:
              type: integer

    # MODIFIED 2026-05-01: FormationDetail now shows specializations (not staff).
    # Staff is now managed per-session via /sessions/{id}/staff.
    FormationDetail:
      allOf:
        - $ref: "#/components/schemas/FormationSummary"
        - type: object
          properties:
            coordinator:
              type: object
              nullable: true
              properties:
                id:
                  type: string
                  format: uuid
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
            specializations:
              type: array
              items:
                $ref: "#/components/schemas/Specialization"
            sessions:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  label:
                    type: string
                  status:
                    $ref: "#/components/schemas/SessionStatus"
                  examDate:
                    type: string
                    format: date-time
                  academicYear:
                    type: string
                  _count:
                    type: object
                    properties:
                      candidates:
                        type: integer

    # MODIFIED 2026-05-01: CreateFormationBody now requires coordinatorId.
    # A STAFF coordinator account is promoted to global COORDINATOR.
    CreateFormationBody:
      type: object
      required: [name, code, department, coordinatorId]
      properties:
        name:
          type: string
          minLength: 2
          example: Doctorat en Informatique
        code:
          type: string
          minLength: 2
          maxLength: 20
          example: INFO-2026
        department:
          type: string
          minLength: 2
          example: Informatique
        description:
          type: string
          example: Formation doctorale en informatique quantique
        coordinatorId:
          type: string
          format: uuid
          description: User ID of the formation coordinator (must be active)

    # MODIFIED 2026-05-01: UpdateFormationBody — added coordinatorId to allow
    # reassigning the coordinator. Kept minLength correct per Zod schema.
    UpdateFormationBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        department:
          type: string
          minLength: 2
        description:
          type: string
        isActive:
          type: boolean
        coordinatorId:
          type: string
          format: uuid
          description: Reassign the formation coordinator (must be active user)

    # REMOVED 2026-05-01: AssignStaffBody — formation staff routes removed.
    # Staff is now assigned per-session via POST /sessions/{id}/staff.

    # REMOVED 2026-05-01: FormationStaffItem — replaced by SessionStaffItem below.

    # ADDED 2026-05-01: Specialization — a doctoral programme track within a formation.
    Specialization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        formationId:
          type: string
          format: uuid
        name:
          type: string
          example: Intelligence Artificielle
        code:
          type: string
          example: IA-01
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    # ADDED 2026-05-01: CreateSpecializationBody
    CreateSpecializationBody:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
          minLength: 2
          example: Intelligence Artificielle
        code:
          type: string
          minLength: 1
          maxLength: 20
          example: IA-01

    # ADDED 2026-05-01: UpdateSpecializationBody
    UpdateSpecializationBody:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        isActive:
          type: boolean

    # ADDED 2026-05-01: SessionSpecialization — links a formation specialization to
    # a session with available slots and candidate count.
    SessionSpecialization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        formationSpecializationId:
          type: string
          format: uuid
        availableSlots:
          type: integer
          example: 10
        formationSpecialization:
          $ref: "#/components/schemas/Specialization"
        _count:
          type: object
          properties:
            candidates:
              type: integer

    # ADDED 2026-05-01: AddSessionSpecializationBody
    AddSessionSpecializationBody:
      type: object
      required: [formationSpecializationId, availableSlots]
      properties:
        formationSpecializationId:
          type: string
          format: uuid
          description: Must be an active specialization belonging to this session's formation
        availableSlots:
          type: integer
          minimum: 1
          example: 10

    # ADDED 2026-05-01: UpdateSessionSpecializationBody
    UpdateSessionSpecializationBody:
      type: object
      properties:
        availableSlots:
          type: integer
          minimum: 1

    # ADDED 2026-05-01: SessionStaffItem — a user assigned to a session with a function.
    # Replaces FormationStaffItem (which was formation-scoped, not session-scoped).
    SessionStaffItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        function:
          $ref: "#/components/schemas/SessionFunction"
        assignedAt:
          type: string
          format: date-time
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            firstName:
              type: string
            lastName:
              type: string
            email:
              type: string
            institution:
              type: string
              nullable: true
            academicGrade:
              type: string
              nullable: true
            specialization:
              type: string
              nullable: true

    # ADDED 2026-05-01: AssignSessionStaffBody — used by POST /sessions/{id}/staff.
    # Uses `function` (not `role`) to match the Zod AssignStaffSchema exactly.
    AssignSessionStaffBody:
      type: object
      required: [userId, function]
      properties:
        userId:
          type: string
          format: uuid
        function:
          $ref: "#/components/schemas/SessionFunction"

    # MODIFIED 2026-05-01: SessionSummary — removed availableSlots (moved to
    # SessionSpecialization). Added specializations array.
    SessionSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        formationId:
          type: string
          format: uuid
        academicYear:
          type: string
          example: 2025/2026
        label:
          type: string
          example: Concours Doctorat Informatique 2025/2026
        status:
          $ref: "#/components/schemas/SessionStatus"
        examDate:
          type: string
          format: date-time
        attendanceDeadline:
          type: string
          format: date-time
          nullable: true
        correctionDeadline:
          type: string
          format: date-time
          nullable: true
        resultsDeadline:
          type: string
          format: date-time
          description: Computed as examDate + 5 days
        createdAt:
          type: string
          format: date-time
        formation:
          type: object
          properties:
            name:
              type: string
            code:
              type: string
            coordinator:
              type: object
              nullable: true
              properties:
                id:
                  type: string
                  format: uuid
                firstName:
                  type: string
                lastName:
                  type: string
        specializations:
          type: array
          items:
            $ref: "#/components/schemas/SessionSpecialization"
        _count:
          type: object
          properties:
            candidates:
              type: integer
            subjects:
              type: integer

    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionSummary"
        - type: object
          properties:
            subjects:
              type: array
              items:
                $ref: "#/components/schemas/Subject"
            gradingConfig:
              $ref: "#/components/schemas/GradingConfig"

    # MODIFIED 2026-05-01: CreateSessionBody — removed availableSlots (now per-specialization).
    # Added optional attendanceDeadline and correctionDeadline (from Zod CreateSessionSchema).
    CreateSessionBody:
      type: object
      required: [formationId, academicYear, label, examDate]
      properties:
        formationId:
          type: string
          format: uuid
        academicYear:
          type: string
          pattern: '^\d{4}\/\d{4}$'
          example: 2025/2026
        label:
          type: string
          minLength: 2
          example: Concours Doctorat Informatique 2025/2026
        examDate:
          type: string
          format: date-time
          example: 2026-04-14T09:00:00.000Z
        attendanceDeadline:
          type: string
          format: date-time
          description: Optional deadline for attendance locking
        correctionDeadline:
          type: string
          format: date-time
          description: Optional deadline for correction

    # MODIFIED 2026-05-01: UpdateSessionBody — removed coordinatorId, academicYear,
    # availableSlots (not in Zod UpdateSessionSchema). Only label, examDate,
    # attendanceDeadline, correctionDeadline are accepted.
    UpdateSessionBody:
      type: object
      properties:
        label:
          type: string
          minLength: 2
        examDate:
          type: string
          format: date-time
          description: Recomputes resultsDeadline (examDate + 5 days) automatically
        attendanceDeadline:
          type: string
          format: date-time
        correctionDeadline:
          type: string
          format: date-time

    Subject:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        name:
          type: string
          example: Génie Logiciel
        coefficient:
          type: number
          example: 1
        maxGrade:
          type: number
          example: 20
        minimumGrade:
          type: number
          example: 10
        description:
          type: string
          nullable: true

    CreateSubjectBody:
      type: object
      required: [name, coefficient]
      properties:
        name:
          type: string
          minLength: 2
          example: Bases de Données Avancées
        coefficient:
          type: number
          minimum: 0.1
          example: 3
        maxGrade:
          type: number
          default: 20
        minimumGrade:
          type: number
          default: 10
        description:
          type: string

    GradingConfig:
      type: object
      nullable: true
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        discrepancyThreshold:
          type: number
          example: 3
          description: Default 3 points — per ministerial regulation
        isDefault:
          type: boolean
          description: true when no config has been saved yet (returns default shape)
        configuredAt:
          type: string
          format: date-time
          nullable: true
        configuredBy:
          type: string
          format: uuid
          nullable: true

    SetGradingConfigBody:
      type: object
      required: [discrepancyThreshold]
      properties:
        discrepancyThreshold:
          type: number
          minimum: 0
          maximum: 20
          default: 3
          example: 3

    # ── Room (global) ─────────────────────────────────────────────────────────
    # NEW
    Room:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Amphi A
        building:
          type: string
          nullable: true
          example: Bâtiment Principal
        floor:
          type: string
          nullable: true
          example: RDC
        capacity:
          type: integer
          example: 60
        isActive:
          type: boolean
          example: true
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    # NEW
    CreateRoomBody:
      type: object
      required: [name, capacity]
      properties:
        name:
          type: string
          minLength: 1
          example: Amphi A
        capacity:
          type: integer
          minimum: 1
          example: 60
        building:
          type: string
          example: Bâtiment Principal
        floor:
          type: string
          example: RDC

    # NEW
    UpdateRoomBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        capacity:
          type: integer
          minimum: 1
        building:
          type: string
        floor:
          type: string

    # ── Session Room ──────────────────────────────────────────────────────────
    # NEW
    SessionRoom:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        roomId:
          type: string
          format: uuid
        usedCapacity:
          type: integer
          nullable: true
          description: Override capacity set by coordinator. Falls back to room.capacity if null.
        lockedAt:
          type: string
          format: date-time
          nullable: true
        lockedBy:
          type: string
          format: uuid
          nullable: true
        room:
          $ref: "#/components/schemas/Room"

    # NEW — full session room detail with candidate + surveillant assignments
    SessionRoomDetail:
      allOf:
        - $ref: "#/components/schemas/SessionRoom"
        - type: object
          properties:
            candidateAssignments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  candidate:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      firstName:
                        type: string
                      lastName:
                        type: string
                      registrationNumber:
                        type: string
            surveillantAssignments:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      firstName:
                        type: string
                      lastName:
                        type: string
                      email:
                        type: string
            _count:
              type: object
              properties:
                candidateAssignments:
                  type: integer
                surveillantAssignments:
                  type: integer

    # MODIFIED 2026-05-01: AddRoomToSessionBody — now requires specializationId
    # (each room in a session is dedicated to a specific specialization).
    # Also accepts optional usedCapacity override at assignment time.
    AddRoomToSessionBody:
      type: object
      required: [roomId, specializationId]
      properties:
        roomId:
          type: string
          format: uuid
          description: ID of an active global Room to link to this session
        specializationId:
          type: string
          format: uuid
          description: ID of the SessionSpecialization this room serves
        usedCapacity:
          type: integer
          minimum: 1
          description: Optional capacity override for this room in this session

    # MODIFIED 2026-05-01: UpdateSessionRoomBody — usedCapacity is now optional
    # (matches Zod updateSessionRoomSchema where usedCapacity is .optional()).
    UpdateSessionRoomBody:
      type: object
      properties:
        usedCapacity:
          type: integer
          minimum: 1
          description: Override effective capacity for this room in this session. Cannot exceed room.capacity.

    # NEW
    AssignSurveillantBody:
      type: object
      required: [userId]
      properties:
        userId:
          type: string
          format: uuid
          description: User ID of a SURVEILLANT registered to this session's formation

    # NEW — returned by POST /sessions/:id/rooms/auto-assign
    AutoAssignResult:
      type: object
      properties:
        assigned:
          type: integer
          example: 87
          description: Total number of candidate assignments created
        rooms:
          type: array
          items:
            type: object
            properties:
              roomName:
                type: string
              capacity:
                type: integer
                description: Raw room capacity
              effectiveCapacity:
                type: integer
                description: Effective capacity used (usedCapacity if set, else capacity)
              assigned:
                type: integer
                description: Number of candidates assigned to this room

    # NEW — returned by POST /sessions/:id/rooms/:sessionRoomId/surveillants
    SurveillantAssignmentResult:
      type: object
      properties:
        assignment:
          type: object
          properties:
            id:
              type: string
              format: uuid
            sessionRoomId:
              type: string
              format: uuid
            userId:
              type: string
              format: uuid
            sessionId:
              type: string
              format: uuid
        warning:
          type: string
          nullable: true
          description: Warning when fewer than 2 surveillants are assigned to the room

    # ── Candidates ────────────────────────────────────────────────────────────
    # UPDATED — added PROGRES fields: firstNameAr, lastNameAr, address, dateOfBirth,
    #           birthPlace, degreeSpeciality (replaces degreeTitle), fieldOfStudy,
    #           cursusType, masterClassCategory, masterAverage, bachelorAverage
    Candidate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        registrationNumber:
          type: string
          example: "2026001"
        firstName:
          type: string
          example: Ahmed
        lastName:
          type: string
          example: Benali
        firstNameAr:
          type: string
          nullable: true
          example: أحمد
          description: Arabic first name from PROGRES
        lastNameAr:
          type: string
          nullable: true
          example: بنعلي
          description: Arabic last name from PROGRES
        email:
          type: string
          nullable: true
          example: ahmed@email.com
        phoneNumber:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
          description: Adresse de Résidence
        dateOfBirth:
          type: string
          format: date-time
          nullable: true
          description: Date de Naissance
        birthPlace:
          type: string
          nullable: true
          description: Lieu Naissance
        nationalId:
          type: string
          nullable: true
        degreeInstitution:
          type: string
          nullable: true
          example: USTHB
          description: Etablissement (diplômé)
        degreeSpeciality:
          type: string
          nullable: true
          example: Informatique
          description: Spécialité diplôme — replaces degreeTitle
        fieldOfStudy:
          type: string
          nullable: true
          example: Génie Informatique
          description: Filière
        cursusType:
          type: string
          nullable: true
          example: LMD
          description: "Type Cursus — e.g.: LMD, CLASSIQUE BAC+5"
        graduationYear:
          type: integer
          nullable: true
          example: 2024
        masterClassCategory:
          type: string
          nullable: true
          description: Catégorie de classement Master (tie-breaker from ministerial regulation)
        masterAverage:
          type: number
          nullable: true
          minimum: 0
          maximum: 20
          description: Moyenne de classement Master (tie-breaker)
        bachelorAverage:
          type: number
          nullable: true
          minimum: 0
          maximum: 20
          description: "Moyenne générale de l'avant dernière année de la formation graduée"
        status:
          $ref: "#/components/schemas/CandidateStatus"
        importBatchId:
          type: string
          format: uuid
          nullable: true
        importedAt:
          type: string
          format: date-time

    ImportBatch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        source:
          $ref: "#/components/schemas/ImportSource"
        fileName:
          type: string
          nullable: true
        totalRecords:
          type: integer
        validRecords:
          type: integer
        invalidRecords:
          type: integer
        validationErrors:
          type: array
          nullable: true
          items:
            type: object
            properties:
              row:
                type: integer
              field:
                type: string
              message:
                type: string
        importedAt:
          type: string
          format: date-time
        importedByUser:
          type: object
          properties:
            firstName:
              type: string
            lastName:
              type: string
            email:
              type: string

    ImportResult:
      type: object
      properties:
        batchId:
          type: string
          format: uuid
        fileName:
          type: string
        source:
          $ref: "#/components/schemas/ImportSource"
        imported:
          type: integer
          example: 44
        skipped:
          type: integer
          example: 1
          description: Duplicate registration numbers skipped
        invalid:
          type: integer
          example: 2
        duplicates:
          type: array
          items:
            type: string
          description: List of duplicate registration numbers (first 20)
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              field:
                type: string
              value: {}
              message:
                type: string
        summary:
          type: string
          example: "44 imported, 1 skipped (duplicates), 2 invalid"

    CandidateStats:
      type: object
      properties:
        total:
          type: integer
        registered:
          type: integer
        valid:
          type: integer
        invalid:
          type: integer

    # --- Attendance -----------------------------------------------------------
    AttendanceAssignment:
      type: object
      properties:
        assignmentId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        sessionLabel:
          type: string
          example: Concours Doctorat IA 2026
        examDate:
          type: string
          format: date-time
        sessionStatus:
          $ref: "#/components/schemas/SessionStatus"
        sessionRoomId:
          type: string
          format: uuid
        room:
          type: object
          properties:
            name:
              type: string
              example: Amphi A
            floor:
              type: string
              nullable: true
              example: RDC
            building:
              type: string
              nullable: true
              example: Batiment Principal
        candidateCount:
          type: integer
          example: 42

    MyAttendanceAssignments:
      type: object
      properties:
        upcoming:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceAssignment"
        active:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceAssignment"
        past:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceAssignment"

    AttendanceSubjectState:
      type: object
      properties:
        subjectId:
          type: string
          format: uuid
        name:
          type: string
          example: Bases de Donnees Avancees
        attended:
          type: boolean
          nullable: true
          description: null means attendance has not been validated yet for this subject in this room.
        anonymityCode:
          type: string
          nullable: true
          example: copy-002

    AttendanceRoomCandidate:
      type: object
      properties:
        candidateId:
          type: string
          format: uuid
        registrationNumber:
          type: string
          example: "2026001"
        firstName:
          type: string
          example: Ahmed
        lastName:
          type: string
          example: Benali
        specializationName:
          type: string
          nullable: true
          example: Intelligence Artificielle
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceSubjectState"

    AttendanceScanItem:
      type: object
      required: [candidateId, qrCode]
      properties:
        candidateId:
          type: string
          format: uuid
        qrCode:
          type: string
          minLength: 1
          example: copy-002

    ValidateAttendanceBody:
      type: object
      required: [sessionRoomId, subjectId, scans]
      properties:
        sessionRoomId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        scans:
          type: array
          description: Candidates who received a paper. Candidates assigned to the room but missing from this array are marked ABSENT.
          items:
            $ref: "#/components/schemas/AttendanceScanItem"

    ValidateAttendanceResult:
      type: object
      properties:
        validated:
          type: integer
          example: 42
        present:
          type: integer
          example: 39
        absent:
          type: integer
          example: 3
        subjectName:
          type: string
          example: Bases de Donnees Avancees

    AttendanceSubjectSummary:
      type: object
      properties:
        subjectId:
          type: string
          format: uuid
        subjectName:
          type: string
          example: Bases de Donnees Avancees
        validated:
          type: boolean
          example: true
        present:
          type: integer
          example: 39
        absent:
          type: integer
          example: 3
        total:
          type: integer
          example: 42

    AttendanceRoomSummary:
      type: object
      properties:
        sessionRoomId:
          type: string
          format: uuid
        roomName:
          type: string
          example: Amphi A
        totalCandidates:
          type: integer
          example: 42
        validatedSubjects:
          type: integer
          example: 2
        pendingSubjects:
          type: integer
          example: 0
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceSubjectSummary"

    AttendanceSessionSummary:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
        sessionLabel:
          type: string
          example: Concours Doctorat IA 2026
        sessionStatus:
          $ref: "#/components/schemas/SessionStatus"
        readyToLock:
          type: boolean
          description: true only when every room has candidates, every registered candidate is assigned, and every room-subject attendance set is complete.
        totalRooms:
          type: integer
          example: 3
        totalSubjects:
          type: integer
          example: 2
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRoomSummary"

    LockAttendanceBody:
      type: object
      required: [confirm]
      properties:
        confirm:
          type: boolean
          const: true
          example: true

    LockAttendanceResult:
      type: object
      properties:
        locked:
          type: boolean
          example: true
        present:
          type: integer
          example: 39
        absent:
          type: integer
          example: 3
        total:
          type: integer
          example: 42

# ─── SECURITY DEFAULT ─────────────────────────────────────────────────────────
security:
  - cookieAuth: []

# ─── PATHS ────────────────────────────────────────────────────────────────────
paths:
  # ══ SYSTEM ══════════════════════════════════════════════════════════════════
  /api/health:
    get:
      summary: Health check
      description: Verify the API and database connections are healthy.
      tags: [System]
      security: []
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  # ══ AUTH ════════════════════════════════════════════════════════════════════
  /api/v1/auth/login:
    post:
      summary: Login
      description: |
        Authenticate with email and password.
        Returns user info and sets JWT in an httpOnly cookie.
        The JWT token is also returned in the response body for non-cookie clients.
        Rate-limited: max 10 requests per 15 minutes.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@concours.dz
                password:
                  type: string
                  minLength: 1
                  example: Admin@2026
            example:
              email: admin@concours.dz
              password: Admin@2026
      responses:
        "200":
          # MODIFIED 2026-05-01: Response now includes token in body alongside cookie
          description: Login successful — JWT cookie set, token also in body
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                              firstName:
                                type: string
                              lastName:
                                type: string
                              email:
                                type: string
                              role:
                                $ref: "#/components/schemas/Role"
                              mustChangePassword:
                                type: boolean
                          token:
                            type: string
                            description: JWT token (also set as httpOnly cookie)
                            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials or inactive account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/logout:
    post:
      summary: Logout
      description: Clears the JWT cookie and ends the session.
      tags: [Auth]
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authenticated

  /api/v1/auth/me:
    get:
      summary: Get current user
      description: Returns the authenticated user's profile and role.
      tags: [Auth]
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          firstName:
                            type: string
                          lastName:
                            type: string
                          email:
                            type: string
                          role:
                            $ref: "#/components/schemas/Role"
                          mustChangePassword:
                            type: boolean
                          lastLogin:
                            type: string
                            format: date-time
                            nullable: true
        "401":
          description: Not authenticated

  /api/v1/auth/change-password:
    post:
      summary: Change password
      description: |
        Change the current user's password.
        Clears the JWT cookie after success — user must re-login.
        Resets mustChangePassword to false.
        Password policy (from Zod ChangePasswordSchema):
          - Minimum 8 characters
          - At least one uppercase letter
          - At least one number
          - New password must differ from old password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                  minLength: 1
                  example: Admin@2026
                newPassword:
                  # MODIFIED 2026-05-01: Added pattern constraints matching Zod ChangePasswordSchema
                  type: string
                  minLength: 8
                  pattern: '^(?=.*[A-Z])(?=.*[0-9]).+$'
                  description: Must contain at least one uppercase letter and one number
                  example: NewAdmin@2026
      responses:
        "200":
          description: Password changed — JWT cookie cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: |
            One of:
            - Current password incorrect
            - New password same as old password
            - Validation error (missing uppercase, number, or length)
        "401":
          description: Not authenticated

  /api/v1/auth/forgot-password:
    post:
      summary: Forgot password
      description: |
        Sends a password reset link to the user's email.
        Always returns the same 200 response regardless of whether the email exists (security).
        Token expires in 15 minutes.
        Rate-limited: max 10 requests per 15 minutes.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: ahmed.benali@usthb.dz
      responses:
        "200":
          description: Reset email sent (same response whether email exists or not)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        # MODIFIED 2026-05-01: Added 500 — thrown when SMTP delivery fails (token rolled back)
        "500":
          description: Email delivery failed — SMTP error (token is cleared, try again later)

  /api/v1/auth/reset-password:
    post:
      summary: Reset password
      description: |
        Reset password using a valid token from the reset email.
        Token is validated by SHA-256 hash comparison.
        Token can only be used once — cleared after use.
        Clears JWT cookie — user must re-login.
        Password policy (from Zod ResetPasswordSchema):
          - Minimum 8 characters
          - At least one uppercase letter
          - At least one number
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                  description: Raw token from reset email URL
                newPassword:
                  # MODIFIED 2026-05-01: Added pattern constraints matching Zod ResetPasswordSchema
                  type: string
                  minLength: 8
                  pattern: '^(?=.*[A-Z])(?=.*[0-9]).+$'
                  description: Must contain at least one uppercase letter and one number
                  example: NewPass@123
      responses:
        "200":
          description: Password reset — JWT cookie cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Token invalid or expired

  # ══ USERS ════════════════════════════════════════════════════════════════════
  /api/v1/users:
    get:
      summary: List all users
      description: |
        Returns all users excluding ADMIN accounts.
        Supports search by name/email and filter by role.
        Admin only.
      tags: [Users]
      parameters:
        - name: search
          in: query
          schema:
            type: string
         # MODIFIED 2026-05-01: Search now also covers institution field
          description: Search by firstName, lastName, email, or institution
          example: Ahmed
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/Role"
          description: Filter by global role
          example: STAFF
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          users:
                            type: array
                            items:
                              $ref: "#/components/schemas/UserSummary"
                          pagination:
                            $ref: "#/components/schemas/Pagination"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin only

    post:
      summary: Create user
      description: |
        Create a new user account (role defaults to STAFF).
        A temporary 16-char hex password is generated and sent by email.
        The user must change the password on first login (mustChangePassword=true).
        Session duties are assigned later via POST /sessions/{id}/staff.
        Admin only.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
            examples:
              corrector:
                # MODIFIED 2026-05-01: Removed role field — not accepted at creation
                summary: Create a future corrector
                value:
                  firstName: Ahmed
                  lastName: Benali
                  email: ahmed.benali@usthb.dz
                  specialization: Intelligence Artificielle
                  academicGrade: Professeur
                  institution: USTHB
              surveillant:
                summary: Create a future surveillant
                value:
                  firstName: Kaci
                  lastName: Mohamed
                  email: kaci@esi-sba.dz
                  phoneNumber: "0555123456"
      responses:
        "201":
          # MODIFIED 2026-05-01: Response data is { user, emailSent } not { user, tempPassword }
          # tempPassword is NOT returned in the response — it is emailed only
          description: User created — welcome email sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/UserDetail"
                          emailSent:
                            type: boolean
                            description: Whether the welcome email was successfully delivered
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin only
        "409":
          description: Email already in use

  /api/v1/users/{id}:
    get:
      summary: Get user by ID
      description: Returns a user's full profile including role-specific data and formation assignments.
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserDetail"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden
        "404":
          description: User not found

    patch:
      summary: Update user
      description: |
        Update user name and role-specific profile fields.
        Role cannot be changed after creation.
        Admin only.
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
            example:
              # MODIFIED 2026-05-01: Removed isAvailable (not a User field)
              firstName: Ahmed
              institution: USTO
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin only
        "404":
          description: User not found

    delete:
      summary: Deactivate user
      description: |
        Soft delete — sets isActive=false. User cannot log in.
        Data is preserved. Admin account cannot be deactivated.
        Admin only.
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: User already inactive
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — cannot deactivate Admin
        "404":
          description: User not found

  /api/v1/users/{id}/reactivate:
    patch:
      summary: Reactivate user
      description: Reactivates a previously deactivated user account. Admin only.
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: User already active
        "404":
          description: User not found

  /api/v1/users/{id}/resend-email:
    post:
      summary: Resend welcome email
      description: |
        Generates a new temporary password and resends the welcome email.
        Resets mustChangePassword to true.
        Admin only.
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Welcome email resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: User not found

  # ══ FORMATIONS ══════════════════════════════════════════════════════════════
  /api/v1/formations:
    get:
      summary: List all formations
      # MODIFIED 2026-05-01: Now includes coordinator and active specializations
      description: Returns all doctoral formations with sessions count, coordinator, and active specializations. Any authenticated user.
      tags: [Formations]
      responses:
        "200":
          description: List of formations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/FormationSummary"
        "401":
          description: Not authenticated

    post:
      summary: Create formation
      description: Create a new doctoral formation. Admin only.
      tags: [Formations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormationBody"
            # MODIFIED 2026-05-01: Added coordinatorId to example
            example:
              name: Doctorat en Informatique
              code: INFO-2026
              department: Informatique
              description: Formation doctorale en informatique quantique
              coordinatorId: 123e4567-e89b-12d3-a456-426614174000
      responses:
        "201":
          description: Formation created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/FormationSummary"
        "400":
          description: Coordinator not found, inactive, or validation error
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin only
        "409":
          description: Formation code already exists

  /api/v1/formations/{id}:
