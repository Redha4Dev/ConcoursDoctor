  # ══ SESSIONS ════════════════════════════════════════════════════════════════
  /api/v1/sessions:
    get:
      summary: List all sessions
      description: Returns all competition sessions with formation, coordinator, and candidate/subject counts. Any authenticated user.
      tags: [Sessions]
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SessionSummary"
        "401":
          description: Not authenticated

    post:
      summary: Create session
      description: |
        Create a new competition session linked to a formation.
        Session is created in DRAFT status.
        resultsDeadline is automatically computed as examDate + 5 days.
        The authenticated user becomes the coordinatorId.
        Admin or Coordinator only.
      tags: [Sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
            # MODIFIED 2026-05-01: Removed availableSlots (moved to session specializations)
            example:
              formationId: 123e4567-e89b-12d3-a456-426614174000
              academicYear: "2025/2026"
              label: Concours Doctorat Informatique 2025/2026
              examDate: "2026-04-14T09:00:00.000Z"
      responses:
        "201":
          description: Session created (status = DRAFT)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SessionSummary"
        "400":
          description: Validation error or formation is inactive
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin or Coordinator only
        "404":
          description: Formation not found

  /api/v1/sessions/{id}:
    get:
      summary: Get session by ID
      description: Returns full session detail including subjects and grading config. Any authenticated user.
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SessionDetail"
        "401":
          description: Not authenticated
        "404":
          description: Session not found

    # MODIFIED 2026-05-01: Updated patch example (removed availableSlots, not in UpdateSessionSchema)
    patch:
      summary: Update session
      description: |
        Update session fields. Session must be in DRAFT status.
        Updating examDate automatically recomputes resultsDeadline (examDate + 5 days).
        Accepted fields: label, examDate, attendanceDeadline, correctionDeadline.
        Admin or Coordinator only.
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionBody"
            example:
              label: Concours Informatique — Session 2
              examDate: "2026-05-01T09:00:00.000Z"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SessionSummary"
        "400":
          description: Validation error or session is not in DRAFT status
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin or Coordinator only
        "404":
          description: Session not found

    # ADDED 2026-05-01: DELETE /sessions/{id} — DRAFT-only hard delete
    delete:
      summary: Delete session
      description: |
        Permanently deletes a DRAFT session.
        Pre-conditions:
          - Session must be in DRAFT status
          - Session must have 0 candidates and 0 subjects (remove them first)
        Admin or Coordinator only.
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session permanently deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          permanent:
                            type: boolean
                            example: true
        "400":
          description: |
            One of:
            - Session is not in DRAFT status
            - Session has existing candidates or subjects
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin or Coordinator only
        "404":
          description: Session not found

