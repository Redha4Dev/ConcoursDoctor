  # ══ CANDIDATES ══════════════════════════════════════════════════════════════
  /api/v1/candidates/{sessionId}/import:
    post:
      summary: Import candidates from CSV or Excel
      # UPDATED — description updated to reflect multi-sheet PROGRES format
      description: |
        Upload a CSV or Excel file to import candidates into a session.

        **PROGRES Excel format**: The file may contain multiple sheets (e.g. `LMD`, `BAC+5`, `AUTRES`).
        Each sheet is processed independently. The `Feuil1` summary sheet is automatically skipped
        when multiple sheets are present.

        **Header detection**: The parser auto-detects the header row by scanning the first 6 rows
        for a row containing "matricule candidat" or "matricule". This handles 2–4 header rows
        that may precede the actual data in PROGRES exports.

        Each row is validated using Zod. Valid rows are saved; invalid rows are reported in the response.
        Duplicate registration numbers in the same session are skipped gracefully.
        Returns a detailed summary of the import operation.

        Session must be in DRAFT or OPEN status.
        Admin or Coordinator only.
      tags: [Candidates]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    CSV or Excel file (.csv, .xls, .xlsx) — max 10MB.
                    Accepted MIME types: text/csv, application/vnd.ms-excel,
                    application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,
                    application/octet-stream.
      responses:
        "200":
          description: Import completed — partial success is still 200
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ImportResult"
        "400":
          description: No file uploaded, unsupported file type, or session not in importable status (DRAFT or OPEN)
        "401":
          description: Not authenticated
        "403":
          description: Forbidden — Admin or Coordinator only
        "404":
          description: Session not found

