      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success

  /api/v1/sessions/{id}/subjects:
    get:
      summary: GET /api/v1/sessions/{id}/subjects
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
    post:
      summary: Add subject to session
      description: |
        Add an exam subject with coefficient to a session.
        Can only be done while session is in DRAFT status.
        Admin or Coordinator.
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubjectBody"
            examples:
              subject1:
                summary: Génie Logiciel (coefficient 1)
                value:
                  name: Génie Logiciel
                  coefficient: 1
                  maxGrade: 20
                  minimumGrade: 10
              subject2:
                summary: Bases de Données Avancées (coefficient 3)
                value:
                  name: Bases de Données Avancées
                  coefficient: 3
                  maxGrade: 20
                  minimumGrade: 10
      responses:
        "201":
          description: Subject added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Subject"
        "400":
          description: Session is not in DRAFT status
        "404":
          description: Session not found

  /api/v1/sessions/{id}/grading-config:
    get:
      summary: GET /api/v1/sessions/{id}/grading-config
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Success
    patch:
      summary: Set grading configuration
      description: |
        Configure the discrepancy threshold for this session.
        Default is 3 points per ministerial regulation (Note n°573).
        Creates config if not exists, updates if already set.
        Admin or Coordinator.
      tags: [Sessions]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetGradingConfigBody"
            example:
              discrepancyThreshold: 3
      responses:
        "200":
          description: Grading config saved
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/GradingConfig"
        "404":
          description: Session not found

  # ══ CANDIDATES ══════════════════════════════════════════════════════════════
  /api/v1/candidates/{sessionId}/import:
    post:
      summary: Import candidates from CSV or Excel
      description: |
        Upload a CSV or Excel file to import candidates into a session.
        Each row is validated using Zod. Valid rows are saved, invalid rows are reported.
        Duplicate registration numbers in the same session are skipped gracefully.
        Returns a detailed summary of the import operation.
        Admin or Coordinator only.
      tags: [Candidates]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV or Excel file (.csv, .xls, .xlsx) — max 10MB
      responses:
        "200":
          description: Import completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ImportResult"
        "400":
          description: No file uploaded or session not in importable status
        "404":
          description: Session not found

  /api/v1/candidates/{sessionId}:
    get:
      summary: List candidates
      description: Returns paginated list of candidates for a session with search and status filter.
      tags: [Candidates]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
          description: Search by firstName, lastName, registrationNumber, or email
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/CandidateStatus"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated list of candidates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          candidates:
                            type: array
                            items:
                              $ref: "#/components/schemas/Candidate"
                          pagination:
                            $ref: "#/components/schemas/Pagination"

  /api/v1/candidates/{sessionId}/stats:
    get:
      summary: Get candidate statistics
      description: Returns count of candidates by status for a session.
      tags: [Candidates]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Candidate statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CandidateStats"

  /api/v1/candidates/{sessionId}/batches:
    get:
      summary: List import batches
      description: Returns the history of all import operations for a session.
      tags: [Candidates]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Import batch history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ImportBatch"

  /api/v1/candidates/{sessionId}/{id}:
    get:
      summary: Get candidate by ID
      description: Returns a single candidate's full details.
      tags: [Candidates]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: id
