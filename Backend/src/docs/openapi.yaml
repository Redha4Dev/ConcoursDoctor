          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Session not found
    patch:
      summary: PATCH /api/v1/sessions/{id}
